<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>New NavBar</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&family=Boldonse&display=swap"
      rel="stylesheet"
    />

    <link href="assets/style.css" rel="stylesheet" />
    <link href="assets/navbar.css" rel="stylesheet" />
  </head>

  <body>
    <header>
      <section class="container-fluid">
        <!-- bandeau avant navbar -->
        <div class="row bg-grey wrapper-pre-bandeau" id="pre-bandeau">
          <!-- Col 1 phone -->
          <div class="col-6">
            <div class="text-center">
              <a href="tel:0673212272" class="text-decoration-none text-white">
                <i class="bi bi-telephone-forward"></i>
                06 00 00 00 00
              </a>
            </div>
          </div>

          <!-- col 2 -->
          <div class="col-lg-6">
            <p class="text-white">Rue des villages | 38000 GRENOBLE</p>
          </div>
        </div>

        <!-- bandeau text -->
        <div class="row bg-grey wrapper-bandeau" id="bandeau">
          <div class="d-flex align-items-center">
            <!-- Carousel -->
            <div
              id="carouselExampleSlidesOnly"
              class="carousel slide"
              data-bs-ride="carousel"
            >
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <h1 class="display-1 text-white bbh d-block w-100">
                    Mon Site
                  </h1>
                </div>
                <div class="carousel-item">
                  <h1 class="display-1 text-white bbh d-block w-100">
                    Mon domaine
                  </h1>
                </div>
                <div class="carousel-item">
                  <h1 class="display-1 text-white bbh d-block w-100">Ma pub</h1>
                </div>
              </div>
            </div>
            <!-- FIN carousel -->
          </div>
          <!-- FIN d-flex -->
        </div>
        <!-- FIN bandeau row -->
      </section>

      <!-- navbar -->
      <div id="nav-bar">
        <nav class="navbar navbar-expand-lg">
          <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>

            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              aria-controls="navbarNav"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#">
                    Home
                  </a>
                </li>

                <li class="nav-item">
                  <a class="nav-link" href="#">Features</a>
                </li>

                <li class="nav-item">
                  <a class="nav-link" href="#">Pricing</a>
                </li>

                <li class="nav-item">
                  <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <!-- Card and image 1 -->
      <div class="row p-4">
        <!-- image -->
        <div
          class="col-lg-5 col-md-5 p-1 col-sm-12 d-flex justify-content-center align-items-center"
        >
          <img
            src="https://picsum.photos/400/400"
            alt="Image_Lorem"
            class="thumbmail img-fluid rounded"
          />
        </div>

        <!-- card -->
        <div class="col-lg-6 col-md-5 col-sm-12 mt-3 rounded">
          <div class="list-article-container p-1">
            <div
              class="row p-2 mx-2 list-article-container-clair d-flex align-items-center justify-content-center"
            >
              <div class="col-2">
                <img
                  src="https://picsum.photos/100/100"
                  alt="..."
                  class="thumbmail img-fluid rounded"
                />
              </div>

              <div class="col-9">
                <h3><a href="#">Titre de l'article</a></h3>
                <p>Texte de l'article</p>
              </div>
            </div>
          </div>

          <div class="list-article-container p-1">
            <div
              class="row p-1 mx-2 list-article-container-clair d-flex align-items-center justify-content-center"
            >
              <div class="col-2">
                <img
                  src="https://picsum.photos/100/100"
                  alt="..."
                  class="thumbmail img-fluid rounded"
                />
              </div>

              <div class="col-9">
                <h3><a href="#">Titre de l'article</a></h3>
                <p>Texte de l'article</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
